<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% block title %}The Great Replacement{% endblock %}</title>
<meta name="description" content="{% block description %}The Great Replacement — find out how exposed your job is to AI displacement.{% endblock %}" />

<!-- Open Graph -->
<meta property="og:type"        content="website" />
<meta property="og:site_name"   content="The Great Replacement" />
<meta property="og:title"       content="{% block og_title %}The Great Replacement — Will AI Take Your Job?{% endblock %}" />
<meta property="og:description" content="{% block og_description %}9.3 million US jobs are at risk in the next 2–5 years. Find out exactly how exposed yours is — free, in 90 seconds.{% endblock %}" />
<meta property="og:url"         content="{% block og_url %}https://thegreatreplacement.fyi{% endblock %}" />
<meta property="og:image"       content="{% block og_image %}https://thegreatreplacement.fyi/static/img/og-image.png{% endblock %}" />
<meta property="og:image:width"  content="1200" />
<meta property="og:image:height" content="630" />
<!-- Twitter / X Card -->
<meta name="twitter:card"        content="summary_large_image" />
<meta name="twitter:title"       content="{% block tw_title %}The Great Replacement — Will AI Take Your Job?{% endblock %}" />
<meta name="twitter:description" content="{% block tw_description %}9.3 million US jobs at risk in the next 2–5 years. Find out where you stand — free.{% endblock %}" />
<meta name="twitter:image"       content="{% block tw_image %}https://thegreatreplacement.fyi/static/img/og-image.png{% endblock %}" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<link rel="canonical" href="{% block canonical %}https://thegreatreplacement.fyi{% endblock %}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

<!-- Structured data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "The Great Replacement",
  "url": "https://thegreatreplacement.fyi",
  "description": "Free AI job displacement calculator. Find out how exposed your job is to AI automation — grounded in Tufts University research.",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://thegreatreplacement.fyi/calculator",
    "query": "Find my AI displacement score"
  }
}
</script>
{% block structured_data %}{% endblock %}
{% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

{% block content %}{% endblock %}

<script src="{{ url_for('config_js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
